name: Release

# Publishing is triggered by publishing a GitHub Release whose tag is `vX.Y.Z`. The tag must match
# the `version` in pyproject.toml (enforced by the version guard below). Cut a release with:
#   gh release create vX.Y.Z --title vX.Y.Z --notes-file <changelog-section>
# The `/release` skill automates the full flow.
on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  # Re-run the full test matrix at the released ref before anything is published.
  test:
    uses: ./.github/workflows/tests.yml

  publish:
    needs: test
    runs-on: ubuntu-latest
    environment: pypi
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v7

      - name: Verify version matches release tag
        run: |
          version="$(uv version --short)"
          tag="${GITHUB_REF_NAME#v}"
          if [ "$version" != "$tag" ]; then
            echo "::error::pyproject.toml version ($version) does not match release tag ($tag)"
            exit 1
          fi
          echo "Releasing version $version"

      - name: Build sdist and wheel
        run: uv build

      - name: Publish to PyPI
        run: uv publish
        env:
          UV_PUBLISH_TOKEN: ${{ secrets.PYPI_TOKEN }}
